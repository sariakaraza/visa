spring.application.name=visa
# Configuration PostgreSQL avec variables d'environnement et valeurs par défaut pour local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/visa}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuration JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Upload local des pièces justificatives (chemin relatif depuis le dossier d'exécution)
app.upload.base-dir=uploads

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat configuration for handling multiple file uploads
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-part-count=50