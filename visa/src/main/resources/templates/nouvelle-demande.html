<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nouvelle Demande de Visa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .radio-group, .checkbox-group {
            margin-bottom: 10px;
        }
        .radio-group label, .checkbox-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
        }
        .hidden {
            display: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Formulaire de Nouvelle Demande de Visa</h1>

    <form th:action="@{/nouvelle-demande}" method="post">
        <div class="form-group">
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" required>
        </div>

        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom">
        </div>

        <div class="form-group">
            <label for="dateNaissance">Date de Naissance *</label>
            <input type="date" id="dateNaissance" name="dateNaissance" required>
        </div>

        <div class="form-group">
            <label for="adresse">Adresse à Madagascar *</label>
            <input type="text" id="adresse" name="adresse" required>
        </div>

        <div class="form-group">
            <label>Situation Familiale *</label>
            <div class="radio-group">
                <label th:each="sit : ${situations}">
                    <input type="radio" name="idSituationFamiliale" th:value="${sit.idSituationFamiliale}" required>
                    <span th:text="${sit.libelle}"></span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="idNationalite">Nationalité *</label>
            <select id="idNationalite" name="idNationalite" required>
                <option th:each="nat : ${nationalites}" th:value="${nat.idNationalite}" th:text="${nat.libelle}" 
                    th:selected="${nat.idNationalite == nationalites[0]?.idNationalite}"></option>
            </select>
        </div>

        <div class="form-group">
            <label>Type de Demande *</label>
            <div class="radio-group">
                <label th:each="td : ${typeDemandes}">
                    <input type="radio" name="idTypeDemande" th:value="${td.idTypeDemande}" required onchange="showDossiers()">
                    <span th:text="${td.libelle}"></span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Type de Visa *</label>
            <div class="radio-group">
                <label th:each="tv : ${typeVisas}">
                    <input type="radio" name="idTypeVisa" th:value="${tv.idTypeVisa}" required>
                    <span th:text="${tv.libelle}"></span>
                </label>
            </div>
        </div>

        <div id="dossiersSection" class="form-group hidden">
            <label>Dossiers Requis</label>
            <div class="checkbox-group" id="dossiersContainer">
            </div>
        </div>

        <button type="submit">Soumettre</button>
    </form>

    <script th:inline="javascript">
        /*<![CDATA[*/

        const dossiersData = /*[[${dossiersData}]]*/ {};

        function showDossiers() {
            const selectedType = document.querySelector(
                'input[name="idTypeDemande"]:checked'
            );

            const dossiersSection = document.getElementById("dossiersSection");
            const dossiersContainer = document.getElementById("dossiersContainer");

            // reset
            dossiersContainer.innerHTML = "";
            dossiersSection.classList.add("hidden");

            if (!selectedType) {
                return;
            }

            const typeDemandeId = selectedType.value;
            const dossiers = dossiersData[typeDemandeId] || [];

            if (dossiers.length === 0) {
                return;
            }

            dossiers.forEach(function(dossier) {
                const label = document.createElement("label");
                label.style.display = "block";
                label.style.marginBottom = "8px";

                label.innerHTML = `
                    <input 
                        type="checkbox" 
                        name="dossiers" 
                        value="${dossier.idDossier}"
                    >
                    <span>${dossier.libelle}</span>
                `;

                dossiersContainer.appendChild(label);
            });

            dossiersSection.classList.remove("hidden");
        }

        /*]]>*/
    </script>
</body>
</html>
