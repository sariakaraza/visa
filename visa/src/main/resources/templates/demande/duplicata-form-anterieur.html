<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Duplicata - Avec données antérieures</title>
    <link rel="stylesheet" th:href="@{/css/demande.css}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-title">Demande</div>
            <nav class="sidebar-nav">
                <a th:href="@{/demande/new}">Ajout</a>
                <a th:href="@{/demande/transfert-visa}">Transfert Visa</a>
                <a th:href="@{/demande/duplicata}">Duplicata</a>
                <a th:href="@{/demande/list}">Liste</a>
            </nav>
        </aside>

        <main class="content">
            <div class="container">
                <h1>Duplicata (Avec données antérieures)</h1>

                <form th:action="@{/demande/duplicata/anterieur}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="idDemandeur">Sélectionner Demandeur *</label>
                        <select id="idDemandeur" name="idDemandeur" required onchange="loadDemandeurInfo();">
                            <option value="">-- Choisir un demandeur --</option>
                            <option th:each="demandeur : ${demandeurs}" 
                                    th:value="${demandeur.idDemandeur}"
                                    th:text="${demandeur.nom} + ' ' + ${demandeur.prenom} + ' (' + ${demandeur.dateNaissance} + ')'">
                            </option>
                        </select>
                    </div>

                    <div id="demandeurInfoSection" class="form-group hidden">
                        <h2>Informations du Demandeur</h2>
                        <div class="kv">
                            <dt>Nom</dt>
                            <dd id="infoDemandeurNom"></dd>
                            <dt>Prénom</dt>
                            <dd id="infoDemandeurPrenom"></dd>
                            <dt>Date de Naissance</dt>
                            <dd id="infoDemandeurDateNaissance"></dd>
                            <dt>Adresse</dt>
                            <dd id="infoDemandeurAdresse"></dd>
                            <dt>Nationalité</dt>
                            <dd id="infoDemandeurNationalite"></dd>
                            <dt>Situation Familiale</dt>
                            <dd id="infoDemandeurSituation"></dd>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Type de Visa *</label>
                        <div class="radio-group">
                            <label th:each="tv : ${typeVisas}">
                                <input type="radio" name="idTypeVisa" th:value="${tv.idTypeVisa}" required onchange="filterDossiersByVisa();">
                                <span th:text="${tv.libelle}"></span>
                            </label>
                        </div>
                    </div>

                    <div id="dossiersSection" class="form-group">
                        <label>Dossiers Requis</label>
                        <div class="checkbox-group" id="dossiersContainer">
                        </div>
                    </div>

                    <input type="hidden" name="idTypeDemande" th:value="${idTypeDemandeFixed}">

                    <button type="submit">Créer Duplicata</button>
                </form>
            </div>
        </main>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/

        const demandeursData = /*[[${demandeurs}]]*/ [];
        const dossiersByVisa = /*[[${dossiersByVisa}]]*/ {};

        function filterDossiersByVisa() {
            const selectedVisaType = document.querySelector('input[name="idTypeVisa"]:checked');
            const dossiersContainer = document.getElementById('dossiersContainer');

            dossiersContainer.innerHTML = '';

            if (!selectedVisaType) {
                return;
            }

            const visaId = selectedVisaType.value;
            const dossiers = dossiersByVisa[visaId] || [];

            if (dossiers.length === 0) {
                const emptyLabel = document.createElement('label');
                emptyLabel.textContent = 'Aucun dossier requis pour ce type de visa.';
                dossiersContainer.appendChild(emptyLabel);
                return;
            }

            dossiers.forEach((dossier) => {
                const label = document.createElement('label');
                label.style.display = 'block';
                label.style.marginBottom = '8px';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'dossiers';
                checkbox.value = dossier.idDossier;

                const span = document.createElement('span');
                span.textContent = ` ${dossier.libelle}`;

                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.name = 'file-' + dossier.idDossier;
                fileInput.id = 'file-' + dossier.idDossier;
                fileInput.accept = 'image/*';
                fileInput.style.display = 'none';

                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        fileInput.style.display = 'block';
                        fileInput.required = true;
                    } else {
                        fileInput.style.display = 'none';
                        fileInput.required = false;
                        fileInput.value = null;
                    }
                });

                label.appendChild(checkbox);
                label.appendChild(span);
                label.appendChild(fileInput);
                dossiersContainer.appendChild(label);
            });
        }

        function loadDemandeurInfo() {
            const idDemandeur = document.getElementById('idDemandeur').value;
            const demandeurInfoSection = document.getElementById('demandeurInfoSection');

            if (!idDemandeur) {
                demandeurInfoSection.classList.add('hidden');
                return;
            }

            const demandeur = demandeursData.find(d => d.idDemandeur == idDemandeur);
            if (!demandeur) return;

            document.getElementById('infoDemandeurNom').textContent = demandeur.nom;
            document.getElementById('infoDemandeurPrenom').textContent = demandeur.prenom || '-';
            document.getElementById('infoDemandeurDateNaissance').textContent = demandeur.dateNaissance || '-';
            document.getElementById('infoDemandeurAdresse').textContent = demandeur.adresse || '-';
            document.getElementById('infoDemandeurNationalite').textContent = (demandeur.nationalite ? demandeur.nationalite.libelle : '-');
            document.getElementById('infoDemandeurSituation').textContent = (demandeur.situationFamiliale ? demandeur.situationFamiliale.libelle : '-');

            demandeurInfoSection.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            filterDossiersByVisa();
        });

        /*]]>*/
    </script>
</body>
</html>
