<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Demande de Visa</title>
    <link rel="stylesheet" th:href="@{/css/demande.css}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-title">Demande</div>
            <nav class="sidebar-nav">
                <a th:href="@{/demande/new}">Ajout</a>
                <a th:href="@{/demande/list}">Liste</a>
            </nav>
        </aside>

        <main class="content">
            <div class="container">
                <h1>Formulaire de Nouvelle Demande de Visa</h1>

                <form th:action="@{/demande/new}" method="post">
                    <div class="form-group">
                        <label for="nom">Nom *</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>

        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom">
        </div>

        <div class="form-group">
            <label for="dateNaissance">Date de Naissance *</label>
            <input type="date" id="dateNaissance" name="dateNaissance" required>
        </div>

        <div class="form-group">
            <label for="nomJeuneFille">Nom de jeune fille</label>
            <input type="text" id="nomJeuneFille" name="nomJeuneFille">
        </div>

        <div class="form-group">
            <label for="telephone">Téléphone</label>
            <input type="text" id="telephone" name="telephone">
        </div>

        <div class="form-group">
            <label for="adresse">Adresse à Madagascar *</label>
            <input type="text" id="adresse" name="adresse" required>
        </div>

        <div class="form-group">
            <label>Situation Familiale *</label>
            <div class="radio-group">
                <label th:each="sit : ${situations}">
                    <input type="radio" name="idSituationFamiliale" th:value="${sit.idSituationFamiliale}" required>
                    <span th:text="${sit.libelle}"></span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="idNationalite">Nationalité *</label>
            <select id="idNationalite" name="idNationalite" required>
                <option th:each="nat : ${nationalites}" th:value="${nat.idNationalite}" th:text="${nat.libelle}" 
                    th:selected="${nat.idNationalite == nationalites[0]?.idNationalite}"></option>
            </select>
        </div>

        <input type="hidden" name="idTypeDemande" th:value="${idTypeDemandeFixed}">

        <div class="form-group">
            <label>Type de Visa *</label>
            <div class="radio-group">
                <label th:each="tv : ${typeVisas}">
                    <input type="radio" name="idTypeVisa" th:value="${tv.idTypeVisa}" required onchange="showPasseportSection(); filterDossiersByVisa();">
                    <span th:text="${tv.libelle}"></span>
                </label>
            </div>
        </div>

        <div id="dossiersSection" class="form-group">
            <label>Dossiers Requis</label>
            <div class="checkbox-group" id="dossiersContainer">
            </div>
        </div>

        <div id="passeportSection" class="form-group hidden">
            <h2>Passeport</h2>
            <div class="form-group">
                <label for="numeroPasseport">Numéro du Passeport *</label>
                <input type="text" id="numeroPasseport" name="numeroPasseport">
            </div>
            <div class="form-group">
                <label for="dateDelivrancePasseport">Date de Délivrance *</label>
                <input type="datetime-local" id="dateDelivrancePasseport" name="dateDelivrancePasseport">
            </div>
            <div class="form-group">
                <label for="dateExpirationPasseport">Date d'Expiration *</label>
                <input type="datetime-local" id="dateExpirationPasseport" name="dateExpirationPasseport">
            </div>
        </div>

        <div id="visaTransformableSection" class="form-group hidden">
            <h2>Visa Transformable</h2>
            <div class="form-group">
                <label for="referenceVisa">Référence du Visa *</label>
                <input type="text" id="referenceVisa" name="referenceVisa">
            </div>
            <div class="form-group">
                <label for="dateEntreeVisa">Date d'Entrée *</label>
                <input type="date" id="dateEntreeVisa" name="dateEntreeVisa">
            </div>
            <div class="form-group">
                <label for="dateExpirationVisa">Date d'Expiration *</label>
                <input type="datetime-local" id="dateExpirationVisa" name="dateExpirationVisa">
            </div>
            <div class="form-group">
                <label for="idLieuVisa">Lieu de délivrance *</label>
                <select id="idLieuVisa" name="idLieuVisa">
                    <option th:each="lieu : ${lieux}" th:value="${lieu.idLieu}" th:text="${lieu.libelle}"></option>
                </select>
            </div>
        </div>

                    <button type="submit">Soumettre</button>
                </form>
            </div>
        </main>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/

        const dossiersByVisa = /*[[${dossiersByVisa}]]*/ {};

        function showPasseportSection() {
            const selectedVisaType = document.querySelector('input[name="idTypeVisa"]:checked');
            const passeportSection = document.getElementById("passeportSection");
            const visaTransformableSection = document.getElementById("visaTransformableSection");

            // reset progressive sections
            passeportSection.classList.add("hidden");
            visaTransformableSection.classList.add("hidden");
            setSectionRequired("passeportSection", false);
            setSectionRequired("visaTransformableSection", false);

            if (!selectedVisaType) {
                return;
            }

            // Passport appears once the user chooses a visa type.
            passeportSection.classList.remove("hidden");
            setSectionRequired("passeportSection", true);
        }

        function setSectionRequired(sectionId, required) {
            const section = document.getElementById(sectionId);
            const fields = section.querySelectorAll("input, select, textarea");
            fields.forEach((field) => {
                if (required) {
                    field.setAttribute("required", "required");
                } else {
                    field.removeAttribute("required");
                }
            });
        }

        function filterDossiersByVisa() {
            const selectedVisaType = document.querySelector('input[name="idTypeVisa"]:checked');
            const dossiersContainer = document.getElementById('dossiersContainer');

            dossiersContainer.innerHTML = '';

            if (!selectedVisaType) {
                return;
            }

            const visaId = selectedVisaType.value;
            const dossiers = dossiersByVisa[visaId] || [];

            if (dossiers.length === 0) {
                const emptyLabel = document.createElement('label');
                emptyLabel.textContent = 'Aucun dossier requis pour ce type de visa.';
                dossiersContainer.appendChild(emptyLabel);
                return;
            }

            dossiers.forEach((dossier) => {
                const label = document.createElement('label');
                label.style.display = 'block';
                label.style.marginBottom = '8px';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'dossiers';
                checkbox.value = dossier.idDossier;

                const span = document.createElement('span');
                span.textContent = ` ${dossier.libelle}`;

                label.appendChild(checkbox);
                label.appendChild(span);
                dossiersContainer.appendChild(label);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const passeportInputs = document.querySelectorAll('#passeportSection input');
            const visaTransformableSection = document.getElementById('visaTransformableSection');

            function checkPasseportCompletion() {
                const allFilled = Array.from(passeportInputs).every(input => input.value.trim() !== '');
                if (allFilled) {
                    visaTransformableSection.classList.remove('hidden');
                    setSectionRequired("visaTransformableSection", true);
                } else {
                    visaTransformableSection.classList.add('hidden');
                    setSectionRequired("visaTransformableSection", false);
                }
            }

            passeportInputs.forEach(input => {
                input.addEventListener('input', checkPasseportCompletion);
            });

            filterDossiersByVisa();
        });


        /*]]>*/
    </script>
</body>
</html>
