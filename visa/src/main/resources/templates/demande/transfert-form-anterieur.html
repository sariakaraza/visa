<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transfert de Visa - Avec données antérieures</title>
    <link rel="stylesheet" th:href="@{/css/demande.css}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-title">Demande</div>
            <nav class="sidebar-nav">
                <a th:href="@{/demande/new}">Ajout</a>
                <a th:href="@{/demande/transfert-visa}">Transfert Visa</a>
                <a th:href="@{/demande/duplicata}">Duplicata</a>
                <a th:href="@{/demande/list}">Liste</a>
            </nav>
        </aside>

        <main class="content">
            <div class="container">
                <h1>Transfert de Visa (Avec données antérieures)</h1>

                <form th:action="@{/demande/transfert-visa/anterieur}" method="post">
                    <div class="form-group">
                        <label for="idDemandeur">Sélectionner Demandeur *</label>
                        <select id="idDemandeur" name="idDemandeur" required onchange="loadDemandeurInfo();">
                            <option value="">-- Choisir un demandeur --</option>
                            <option th:each="demandeur : ${demandeurs}" 
                                    th:value="${demandeur.idDemandeur}"
                                    th:text="${demandeur.nom} + ' ' + ${demandeur.prenom} + ' (' + ${demandeur.dateNaissance} + ')'">
                            </option>
                        </select>
                    </div>

                    <div id="demandeurInfoSection" class="form-group hidden">
                        <h2>Informations du Demandeur</h2>
                        <div class="kv">
                            <dt>Nom</dt>
                            <dd id="infoDemandeurNom"></dd>
                            <dt>Prénom</dt>
                            <dd id="infoDemandeurPrenom"></dd>
                            <dt>Date de Naissance</dt>
                            <dd id="infoDemandeurDateNaissance"></dd>
                            <dt>Adresse</dt>
                            <dd id="infoDemandeurAdresse"></dd>
                            <dt>Nationalité</dt>
                            <dd id="infoDemandeurNationalite"></dd>
                            <dt>Situation Familiale</dt>
                            <dd id="infoDemandeurSituation"></dd>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Type de Visa *</label>
                        <div class="radio-group">
                            <label th:each="tv : ${typeVisas}">
                                <input type="radio" name="idTypeVisa" th:value="${tv.idTypeVisa}" required>
                                <span th:text="${tv.libelle}"></span>
                            </label>
                        </div>
                    </div>

                    <input type="hidden" name="idTypeDemande" th:value="${idTypeDemandeFixed}">

                    <div id="passeportSection" class="form-group">
                        <h2>Nouveau Passeport</h2>
                        <div class="form-group">
                            <label for="numeroPasseport">Numéro du Passeport *</label>
                            <input type="text" id="numeroPasseport" name="numeroPasseport" required>
                        </div>
                        <div class="form-group">
                            <label for="dateDelivrancePasseport">Date de Délivrance *</label>
                            <input type="datetime-local" id="dateDelivrancePasseport" name="dateDelivrancePasseport" required>
                        </div>
                        <div class="form-group">
                            <label for="dateExpirationPasseport">Date d'Expiration *</label>
                            <input type="datetime-local" id="dateExpirationPasseport" name="dateExpirationPasseport" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="idLieuVisa">Lieu de délivrance</label>
                        <select id="idLieuVisa" name="idLieuVisa">
                            <option value="">-- Choisir un lieu --</option>
                            <option th:each="lieu : ${lieux}" th:value="${lieu.idLieu}" th:text="${lieu.libelle}"></option>
                        </select>
                    </div>

                    <button type="submit">Soumettre</button>
                </form>
            </div>
        </main>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/

        const demandeursData = /*[[${demandeurs}]]*/ [];

        function loadDemandeurInfo() {
            const idDemandeur = document.getElementById('idDemandeur').value;
            const demandeurInfoSection = document.getElementById('demandeurInfoSection');

            if (!idDemandeur) {
                demandeurInfoSection.classList.add('hidden');
                return;
            }

            const demandeur = demandeursData.find(d => d.idDemandeur == idDemandeur);
            if (!demandeur) return;

            document.getElementById('infoDemandeurNom').textContent = demandeur.nom;
            document.getElementById('infoDemandeurPrenom').textContent = demandeur.prenom || '-';
            document.getElementById('infoDemandeurDateNaissance').textContent = demandeur.dateNaissance || '-';
            document.getElementById('infoDemandeurAdresse').textContent = demandeur.adresse || '-';
            document.getElementById('infoDemandeurNationalite').textContent = (demandeur.nationalite ? demandeur.nationalite.libelle : '-');
            document.getElementById('infoDemandeurSituation').textContent = (demandeur.situationFamiliale ? demandeur.situationFamiliale.libelle : '-');

            demandeurInfoSection.classList.remove('hidden');
        }

        /*]]>*/
    </script>
</body>
</html>
